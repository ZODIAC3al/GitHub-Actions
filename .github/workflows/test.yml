name: Test Project
on: push
jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v6
      - name: Install NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: 22.22.1
      - name: Install Dependencies
        run: npm ci
      - name: Run Tests
        run: npm test
